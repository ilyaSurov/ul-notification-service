services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-app
    ports:
      - "8080:8080"
    environment:
      APP_NAME: "Notification Service"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: base64:U4TgS2k+7Q8F7xG1W9mH3jL5nP0vR2sT6yU8iO1pA4=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_QUEUE: notifications
      NOTIFICATION_QUEUE: notifications
      L5_SWAGGER_GENERATE_ALWAYS: "false"
      L5_SWAGGER_CONST_HOST: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notification-worker
    command: ["php", "artisan", "queue:work", "rabbitmq", "--queue=notifications", "--sleep=1", "--tries=3", "--timeout=120"]
    environment:
      APP_NAME: "Notification Service"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:U4TgS2k+7Q8F7xG1W9mH3jL5nP0vR2sT6yU8iO1pA4=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: notifications
      DB_USERNAME: notifications
      DB_PASSWORD: secret
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: rabbitmq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      RABBITMQ_QUEUE: notifications
      NOTIFICATION_QUEUE: notifications
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification-rabbitmq
    ports:
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
